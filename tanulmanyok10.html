<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">

<style>

/* ===== TELJES OLDAL BEÁLLÍTÁS ===== */
body {
    margin: 0; /* eltünteti a böngésző alap margóját */
    height: 100vh; /* a teljes képernyő magasságát használja */
    background: linear-gradient(to right, black, gray); /* fekete → szürke háttér */
    font-family: Arial, sans-serif; /* betűtípus */
}
/* ===== TÁBLÁZAT BEÁLLÍTÁS ===== */
table{
    width: 90%; /* a táblázat a képernyő 90%-át foglalja el */
    margin: 60px auto; /* felül 60px hely, vízszintesen középre */
    border-collapse: collapse; /* a cellák kerete összeolvad */
}

/* ===== TÁBLÁZAT CELLÁK ===== */
td {
    width: 33.33%; 
    text-align: center; 
    padding: 30px;
    font-size: 22px; 
    font-weight: bold; 
    color: white; 
    border: 2px solid white;
    background-color: rgba(0, 0, 0, 0.6); 
    transition: 0.4s; 
}
/* ===== LINK STÍLUS ===== */
td a {
    color: white;
    text-decoration: none; 
    display: block; 
}
/* ===== HOVER EFFEKT ===== */
td:hover {
    background-color: white; 
    color: black; 
    cursor: pointer; 
}
/* ===== LINK SZÍN HOVERKOR ===== */
td:hover a {
    color: black;
}
/* ===== BEMUTATKOZÁS TÁBLÁZAT: sorok magasabbak, képek elférnek ===== */
.tartalom td {
    border:2px solid white;
    padding:10px;
    color:white;
    font-size:18px;
    background-color: rgba(0,0,0,0.6);
    vertical-align: middle; /* középre igazítás függőlegesen */
}

/* sorok minimum magassága */
.tartalom tr {
    height:150px; /* állítsd a képek méretéhez, pl. 150px */
}

/* képek a táblázatban */
.tartalom{
    width:80%;
    margin:50px auto;
    border-collapse:collapse;
}

.tartalom td{
    border:2px solid white;
    padding:10px;
    text-align:center;
}

/* KÉPEK */
.tartalom img{
    width:100%;       
    height:auto;       
    max-height:250px;  
    object-fit:contain; 
}
.nagy-select{
	font-size:30px;
	padding:10px;
}
</style>
